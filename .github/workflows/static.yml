name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 必须的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 强制使用 Node.js 24，避免警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # 自动开启 Pages

      - name: 构建站点（示例：复制静态文件）
        run: |
          mkdir -p _site
          cp -r ./* _site/

      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
